<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahar Tal - Music Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
            color: #f0f0f0;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #ff8800;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #current-song {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.2rem;
            color: #ffcc00;
            border-right: 5px solid #ff8800;
        }

        audio {
            width: 100%;
            margin-bottom: 20px;
            filter: invert(1) hue-rotate(180deg); /* הופך את הנגן לכהה */
        }

        .controls {
            margin-bottom: 30px;
        }

        button {
            background: #ff8800;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4444;
            transform: translateY(-2px);
        }

        #song-list {
            display: grid;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-left: 10px;
        }

        .song {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song:hover {
            background: rgba(102, 153, 255, 0.3);
            border-right: 4px solid #6699ff;
        }

        .song.active {
            background: rgba(255, 136, 0, 0.2);
            border-right: 4px solid #ff8800;
        }

        /* עיצוב פס גלילה */
        #song-list::-webkit-scrollbar { width: 8px; }
        #song-list::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 Shahar Tal 🎵</h1>
        
        <div id="current-song">בוחרים שיר ומתחילים...</div>
        
        <audio id="audio-player" controls></audio>
        
        <div class="controls">
            <button onclick="playRandom()">🔀 שיר אקראי (Shuffle)</button>
        </div>

        <div id="song-list">
            </div>
    </div>

    <script>
        const baseURL = "./"; 

        // כאן אתה מעדכן את הרשימה כשאתה מוסיף קבצים ל-GitHub
        const songs = [
            "BillieEilish-Lovely.mp3",
            "RetroWaveRadio-Flashdance.mp3"
        ];

        const songList = document.getElementById('song-list');
        const audioPlayer = document.getElementById('audio-player');
        const currentSongDisplay = document.getElementById('current-song');

        // טעינת הרשימה למסך
        function loadPlaylist() {
            songList.innerHTML = '';
            songs.forEach((song, index) => {
                const div = document.createElement('div');
                div.className = 'song';
                div.innerHTML = `<span>${index + 1}. ${song.replace('.mp3', '')}</span> <span>▶️</span>`;
                div.onclick = () => playSong(song, div);
                songList.appendChild(div);
            });
        }

        function playSong(song, element) {
            // טיפול בסימון השיר הפעיל
            document.querySelectorAll('.song').forEach(s => s.classList.remove('active'));
            if(element) element.classList.add('active');

            // ניגון
            audioPlayer.src = encodeURI(baseURL + song);
            currentSongDisplay.textContent = `מנגן כעת: ${song.replace('.mp3', '')}`;
            
            audioPlayer.play().catch(e => {
                console.error(e);
                alert("שגיאה: וודא ששם הקובץ ב-GitHub תואם בדיוק לקוד!");
            });
        }

        function playRandom() {
            const randomIndex = Math.floor(Math.random() * songs.length);
            const allSongs = document.querySelectorAll('.song');
            playSong(songs[randomIndex], allSongs[randomIndex]);
        }

        // ניגון אוטומטי של השיר הבא בסיום
        audioPlayer.onended = () => {
            playRandom(); // או שאפשר לבנות פונקציה לשיר הבא בתור
        };

        loadPlaylist();
    </script>
</body>
</html>
